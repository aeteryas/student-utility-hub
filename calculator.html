<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator | Student Utility Hub</title>

    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/calculator.css">
    <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>

<nav class="navbar">
    <div class="logo">🧮 Expense Calculator Hub</div>

    <div class="nav-links">
        <button onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button onclick="Logout()">Logout</button>
    </div>
</nav>

<div class="page-title">
    <h1>🧮 Expense Calculator</h1>
    <p>Track your spending. Stay within budget.</p>
</div>

<div class="expense-container">

    <div class="expense-box">

        <h2>💵 Budget Setup</h2>

        <input type="number" id="limit" placeholder="Enter spending limit">
        
        <div class="top-actions">
            <button onclick="updateBudget()">Update Budget</button>
            <button onclick="clearAll()">Clear All</button>
        </div>
        
        <h2>🛒 Add Expense</h2>

        <input type="text" id="item" placeholder="Item name">
        <input type="number" id="price" placeholder="Price">

        <button onclick="addExpense()">Add Expense</button>

        <div class="expense-list" id="list"></div>

    </div>

    <div class="status-box">

        <h2>📊 Budget Status</h2>

        <div class="status-card">
            <p>Total Spent</p>
            <h3>₹<span id="spent">0</span></h3>
        </div>

        <div class="status-card">
            <p>Remaining</p>
            <h3>₹<span id="remain">0</span></h3>
        </div>

        <div id="warning" class="warning-box">
            Set your budget to begin.
        </div>

    </div>

</div>

<script src="Scripts/main.js"></script>
<script src="Scripts/calculator.js"></script>

<footer>
    <p>© 2026 Student Utility Hub | Culmination of Creativity</p>
</footer>

</body>
</html>
